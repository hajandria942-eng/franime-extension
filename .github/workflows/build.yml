name: Build and Deploy Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 34
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'
          cache-disabled: true
          validate-wrappers: false

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew :franime:assembleRelease --no-daemon --stacktrace

      - name: Prepare APK and index
        run: |
          APK_PATH=$(find . -name "*.apk" | head -1)
          APK_NAME="franime-v${{ github.run_number }}.apk"
          cp "$APK_PATH" "$APK_NAME" 2>/dev/null || echo "APK not found"
          cat > index.min.json << EOF
          {
            "name": "FRAnime Extension Repository",
            "website": "https://github.com/${{ github.repository }}",
            "extensions": [
              {
                "name": "FRAnime",
                "pkg": "eu.kanade.tachiyomi.animeextension.fr.franime",
                "apk": "$APK_NAME",
                "lang": "fr",
                "code": ${{ github.run_number }},
                "version": "1.0.${{ github.run_number }}",
                "nsfw": 0,
                "sources": [
                  {
                    "name": "FRAnime",
                    "lang": "fr",
                    "id": "fr.franime",
                    "baseUrl": "https://franime.fr"
                  }
                ]
              }
            ]
          }
          EOF
          mkdir -p release
          cp "$APK_NAME" release/ 2>/dev/null || true
          cp index.min.json release/

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to repo branch
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git checkout --orphan repo
          git rm -rf . || true
          cp release/* . 2>/dev/null || true
          git add index.min.json *.apk 2>/dev/null || true
          git commit -m "Deploy repository v${{ github.run_number }}" || echo "No files to commit"
          git push origin repo --force
