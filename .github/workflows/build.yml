name: Build and Deploy Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Build APK
        run: ./gradlew :franime:assembleRelease --no-daemon --stacktrace

      - name: Prepare APK and index
        run: |
          APK_PATH=$(find . -name "*.apk" | head -1)
          APK_NAME="franime-v${{ github.run_number }}.apk"
          cp $APK_PATH $APK_NAME

          cat > index.min.json << EOF
          {
            "name": "FRAnime Extension Repository",
            "website": "https://github.com/${{ github.repository }}",
            "extensions": [
              {
                "name": "FRAnime",
                "pkg": "eu.kanade.tachiyomi.animeextension.fr.franime",
                "apk": "$APK_NAME",
                "lang": "fr",
                "code": ${{ github.run_number }},
                "version": "1.0.${{ github.run_number }}",
                "nsfw": 0,
                "sources": [
                  {
                    "name": "FRAnime",
                    "lang": "fr",
                    "id": "fr.franime",
                    "baseUrl": "https://franime.fr"
                  }
                ]
              }
            ]
          }
          EOF

          mkdir -p release
          cp $APK_NAME release/
          cp index.min.json release/

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to repo branch
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git checkout --orphan repo
          git rm -rf .
          cp release/* .
          git add index.min.json *.apk
          git commit -m "Deploy repository v${{ github.run_number }}"
          git push origin repo --force
